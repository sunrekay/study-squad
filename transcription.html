<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySquad — транскрипция</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: #1e1e2e;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --radius: 16px;
      --success: #4ade80;
      --error: #f87171;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Golos Text', sans-serif; }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 20%, rgba(124,106,255,0.08) 0%, transparent 60%), var(--bg);
      pointer-events: none;
    }

    .layout { position: relative; z-index: 1; display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

    .sidebar { border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; height: 100vh; }
    .logo { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; padding: 8px 12px 20px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s ease; text-decoration: none; }
    .nav-item:hover { background: var(--surface); color: var(--text); }
    .nav-item.active { background: rgba(124,106,255,0.12); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .user-block { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 600; }
    .logout-btn { font-size: 12px; color: var(--muted); cursor: pointer; padding: 4px 12px; border-radius: 6px; background: none; border: none; font-family: inherit; }
    .logout-btn:hover { color: var(--error); }

    /* Main */
    .main { padding: 40px; display: flex; flex-direction: column; gap: 28px; max-width: 800px; }

    .back-link { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; text-decoration: none; width: fit-content; }
    .back-link:hover { color: var(--text); }

    /* Header */
    .header { display: flex; flex-direction: column; gap: 12px; }

    .meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .badge {
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-done { background: rgba(74,222,128,0.1); color: var(--success); }
    .badge-pending { background: rgba(251,191,36,0.1); color: #fbbf24; }
    .badge-processing { background: rgba(124,106,255,0.1); color: var(--accent); }
    .badge-error { background: rgba(248,113,113,0.1); color: var(--error); }

    .meta-text { font-size: 13px; color: var(--muted); }

    .page-title { font-family: 'Unbounded', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn-primary {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      background: var(--accent); color: white;
      border: none; border-radius: 10px;
      font-family: 'Golos Text', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .btn-primary:hover { background: #6b5ae0; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,106,255,0.3); }

    .btn-secondary {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      font-family: 'Golos Text', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; text-decoration: none;
    }
    .btn-secondary:hover { background: var(--surface2); }

    /* Transcript */
    .transcript-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .transcript-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .transcript-title { font-size: 14px; font-weight: 600; }

    .copy-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-family: 'Golos Text', sans-serif; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .transcript-body {
      padding: 24px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      max-height: 500px;
      overflow-y: auto;
    }

    .transcript-body::-webkit-scrollbar { width: 6px; }
    .transcript-body::-webkit-scrollbar-track { background: transparent; }
    .transcript-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Loading */
    .loading-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 60px 20px; text-align: center;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(124,106,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 15px; color: var(--muted); }

    /* Error */
    .error-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 60px 20px; text-align: center;
    }
    .error-icon { font-size: 40px; }
    .error-text { font-size: 15px; color: var(--error); }

    /* Skeleton */
    .loading-skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo"><div class="logo-dot"></div>StudySquad</div>
      <a href="dashboard.html" class="nav-item"><span class="icon">🏠</span> Главная</a>
      <a href="upload.html" class="nav-item"><span class="icon">🎙️</span> Загрузить лекцию</a>
      <a href="#" class="nav-item"><span class="icon">📚</span> Предметы</a>
      <a href="#" class="nav-item"><span class="icon">👥</span> Моя группа</a>
      <a href="quizzes.html" class="nav-item"><span class="icon">🧠</span> Квизы</a>
      <div class="sidebar-bottom">
        <div class="user-block">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="user-info"><div class="user-name" id="userName">...</div></div>
        </div>
        <button class="logout-btn" onclick="logout()">Выйти</button>
      </div>
    </aside>

    <main class="main">
      <a href="dashboard.html" class="back-link">← Назад</a>

      <div id="content">
        <!-- Loading skeleton -->
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div style="height:20px; width:200px;" class="loading-skeleton"></div>
          <div style="height:32px; width:400px;" class="loading-skeleton"></div>
          <div style="height:40px;" class="loading-skeleton"></div>
          <div style="height:300px;" class="loading-skeleton"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const CONFIG = { API_URL: 'https://d5dl1rb13ng0aicdmdk1.hsvi2zuh.apigw.yandexcloud.net' }

    const token = localStorage.getItem('token')
    const user = JSON.parse(localStorage.getItem('user') || 'null')
    if (!token) { window.location.href = 'index.html' }
    if (user) {
      document.getElementById('userName').textContent = user.name || user.email
      document.getElementById('avatarInitial').textContent = (user.name || user.email || '?')[0].toUpperCase()
    }

    const params = new URLSearchParams(window.location.search)
    const id = params.get('id')

    if (!id) { window.location.href = 'dashboard.html' }

    const statusMap = {
      done: ['badge-done', 'Готово'],
      pending: ['badge-pending', 'Ожидает'],
      processing: ['badge-processing', 'Обрабатывается...'],
      error: ['badge-error', 'Ошибка'],
    }

    async function loadTranscription() {
      try {
        const res = await fetch(`${CONFIG.API_URL}/transcriptions/${id}`, {
          headers: { Authorization: `Bearer ${token}` }
        })

        if (!res.ok) throw new Error('not found')

        const data = await res.json()
        render(data)

        // Если ещё обрабатывается — поллим каждые 3 секунды
        if (data.status === 'pending' || data.status === 'processing') {
          setTimeout(loadTranscription, 3000)
        }

      } catch (e) {
        document.getElementById('content').innerHTML = `
          <div class="error-state">
            <div class="error-icon">⚠️</div>
            <div class="error-text">Не удалось загрузить транскрипцию</div>
            <a href="dashboard.html" style="color: var(--accent); font-size: 14px;">← Вернуться</a>
          </div>`
      }
    }

    function render(data) {
      const [badgeCls, badgeLabel] = statusMap[data.status] || ['badge-pending', 'Ожидает']
      const date = new Date(data.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })

      let transcriptBlock = ''

      if (data.status === 'done' && data.transcript) {
        transcriptBlock = `
          <div class="transcript-card">
            <div class="transcript-header">
              <div class="transcript-title">Текст транскрипции</div>
              <button class="copy-btn" onclick="copyText()">📋 Скопировать</button>
            </div>
            <div class="transcript-body" id="transcriptText">${data.transcript}</div>
          </div>`
      } else if (data.status === 'processing' || data.status === 'pending') {
        transcriptBlock = `
          <div class="transcript-card">
            <div class="loading-state">
              <div class="spinner"></div>
              <div class="loading-text">Транскрипция готовится...<br/>Обычно это занимает 1-3 минуты</div>
            </div>
          </div>`
      } else if (data.status === 'error') {
        transcriptBlock = `
          <div class="transcript-card">
            <div class="error-state">
              <div class="error-icon">❌</div>
              <div class="error-text">Не удалось обработать файл</div>
            </div>
          </div>`
      }

      document.getElementById('content').innerHTML = `
        <div class="header">
          <div class="meta">
            <span class="badge ${badgeCls}">${badgeLabel}</span>
            <span class="meta-text">${data.subject_name || 'Без предмета'}</span>
            <span class="meta-text">${date}</span>
            ${data.is_group ? '<span class="meta-text">👥 Групповая</span>' : ''}
          </div>
          <h1 class="page-title">${data.title}</h1>
          <div class="actions">
            ${data.status === 'done' ? `<button class="btn-primary" onclick="generateQuiz()">🧠 Создать квиз</button>` : ''}
            <a href="dashboard.html" class="btn-secondary">← Назад</a>
          </div>
        </div>
        ${transcriptBlock}`
    }

    function copyText() {
      const text = document.getElementById('transcriptText')?.innerText
      if (text) {
        navigator.clipboard.writeText(text)
        const btn = document.querySelector('.copy-btn')
        btn.textContent = '✅ Скопировано'
        setTimeout(() => btn.textContent = '📋 Скопировать', 2000)
      }
    }

    async function generateQuiz() {
      const btn = document.querySelector('.btn-primary')
      btn.disabled = true
      btn.textContent = '⏳ Генерируем квиз...'

      try {
        const res = await fetch(`${CONFIG.API_URL}/quizzes`, {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            transcription_id: id,
            title: 'Квиз по лекции'
          })
        })

        const data = await res.json()

        if (!res.ok) throw new Error(data.error)

        // Редирект на страницу квиза
        window.location.href = `quiz.html?id=${data.quiz_id}`

      } catch (e) {
        alert('Не удалось создать квиз. Попробуй ещё раз.')
        btn.disabled = false
        btn.textContent = '🧠 Создать квиз'
      }
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html' }

    loadTranscription()
  </script>
</body>
</html>
