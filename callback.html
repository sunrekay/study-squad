<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySquad — вход...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Golos+Text:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Golos Text', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(124,106,255,0.12) 0%, transparent 60%),
        var(--bg);
    }

    .content {
      position: relative; z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(124,106,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 15px;
      color: var(--muted);
    }

    .error-block {
      display: none;
      background: rgba(255,60,60,0.08);
      border: 1px solid rgba(255,60,60,0.2);
      border-radius: 12px;
      padding: 16px 24px;
      font-size: 14px;
      color: #ff6b6b;
      max-width: 320px;
      text-align: center;
    }

    .btn-back {
      display: none;
      padding: 12px 24px;
      background: rgba(124,106,255,0.1);
      border: 1px solid rgba(124,106,255,0.3);
      border-radius: 12px;
      color: var(--accent);
      font-family: 'Golos Text', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="content">
    <div class="logo">StudySquad</div>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">Выполняем вход...</p>
    <div class="error-block" id="error"></div>
    <a href="index.html" class="btn-back" id="backBtn">← Вернуться</a>
  </div>

  <script>
    const CONFIG = {
      CLIENT_ID: 'd99fd9a6b15043a9a332ecf4b406b68f',
      REDIRECT_URI: 'https://sunrekay.github.io/study-squad/callback.html',
      API_URL: 'https://d5dl1rb13ng0aicdmdk1.hsvi2zuh.apigw.yandexcloud.net'
    }

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search)
      const code = params.get('code')
      const error = params.get('error')

      if (error || !code) {
        showError('Авторизация отменена или произошла ошибка')
        return
      }

      try {
        document.getElementById('status').textContent = 'Получаем данные пользователя...'

        // Отправляем code на наш API — Cloud Function обменяет на токен
        const res = await fetch(`${CONFIG.API_URL}/auth/yandex?code=${code}&redirect_uri=${encodeURIComponent(CONFIG.REDIRECT_URI)}`)

        if (!res.ok) throw new Error('Ошибка сервера')

        const data = await res.json()

        // Сохраняем JWT токен
        localStorage.setItem('token', data.token)
        localStorage.setItem('user', JSON.stringify(data.user))

        document.getElementById('status').textContent = 'Успешно! Переходим...'

        setTimeout(() => {
          window.location.href = 'dashboard.html'
        }, 800)

      } catch (e) {
        showError('Не удалось войти. Попробуй ещё раз.')
      }
    }

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none'
      document.getElementById('status').style.display = 'none'
      const err = document.getElementById('error')
      err.textContent = msg
      err.style.display = 'block'
      document.getElementById('backBtn').style.display = 'inline-block'
    }

    handleCallback()
  </script>
</body>
</html>
