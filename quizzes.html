<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySquad — квизы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0f; --surface: #13131a; --surface2: #1a1a24; --border: #1e1e2e; --accent: #7c6aff; --accent2: #ff6a9b; --text: #e8e8f0; --muted: #6b6b80; --radius: 16px; --success: #4ade80; --error: #f87171; }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Golos Text', sans-serif; }
    .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 60% 40% at 50% 20%, rgba(124,106,255,0.08) 0%, transparent 60%), var(--bg); pointer-events: none; }
    .layout { position: relative; z-index: 1; display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar { border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; height: 100vh; }
    .logo { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; padding: 8px 12px 20px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s ease; text-decoration: none; }
    .nav-item:hover { background: var(--surface); color: var(--text); }
    .nav-item.active { background: rgba(124,106,255,0.12); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .user-block { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 600; }
    .logout-btn { font-size: 12px; color: var(--muted); cursor: pointer; padding: 4px 12px; border-radius: 6px; background: none; border: none; font-family: inherit; }
    .logout-btn:hover { color: var(--error); }
    .main { padding: 40px; display: flex; flex-direction: column; gap: 28px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; }
    .page-title { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 14px; transition: all 0.15s ease; color: inherit; }
    .quiz-card:hover { border-color: rgba(124,106,255,0.3); background: var(--surface2); transform: translateY(-2px); }
    .quiz-card-header { display: flex; align-items: flex-start; gap: 12px; }
    .quiz-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(124,106,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .quiz-title { font-size: 15px; font-weight: 600; line-height: 1.3; flex: 1; }
    .quiz-meta { display: flex; flex-direction: column; gap: 6px; }
    .quiz-meta-item { font-size: 12px; color: var(--muted); }
    .quiz-footer { display: flex; align-items: center; justify-content: space-between; }
    .quiz-questions-count { font-size: 12px; color: var(--muted); background: var(--surface2); padding: 4px 10px; border-radius: 100px; }
    .btn-start { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 8px; font-family: 'Golos Text', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .btn-start:hover { background: #6b5ae0; }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 12px; grid-column: 1 / -1; }
    .empty-icon { font-size: 48px; opacity: 0.5; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty-sub { font-size: 14px; }
    .btn-primary { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: 'Golos Text', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 8px; }
    .loading-skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Mobile ── */
    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(19,19,26,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
    .mobile-nav-inner { display: flex; justify-content: space-around; align-items: center; }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 16px; font-size: 10px; font-weight: 600; color: var(--muted); text-decoration: none; min-width: 60px; }
    .mobile-nav-item .mnav-icon { font-size: 20px; line-height: 1; }
    .mobile-nav-item.active { color: var(--accent); }
    .mobile-header { display: none; position: sticky; top: 0; z-index: 50; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 20px; align-items: center; justify-content: space-between; }
    .mobile-logo { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .mobile-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .mobile-nav { display: block; }
      .mobile-header { display: flex; }
      .main { padding: 16px 16px 90px; gap: 20px; }
      .page-title { font-size: 18px; }
      .quiz-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="mobile-header">
    <div class="mobile-logo"><div class="logo-dot"></div>StudySquad</div>
    <div class="mobile-avatar" id="mobileAvatar">?</div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo"><div class="logo-dot"></div>StudySquad</div>
      <a href="dashboard.html" class="nav-item"><span class="icon">🏠</span> Главная</a>
      <a href="upload.html" class="nav-item"><span class="icon">🎙️</span> Загрузить лекцию</a>
      <a href="#" class="nav-item"><span class="icon">📚</span> Предметы</a>
      <a href="#" class="nav-item"><span class="icon">👥</span> Моя группа</a>
      <a href="quizzes.html" class="nav-item active"><span class="icon">🧠</span> Квизы</a>
      <div class="sidebar-bottom">
        <div class="user-block">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="user-info"><div class="user-name" id="userName">...</div></div>
        </div>
        <button class="logout-btn" onclick="logout()">Выйти</button>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">Мои квизы</h1>
      </div>
      <div class="quiz-grid" id="quizGrid">
        <div style="height: 160px;" class="loading-skeleton"></div>
        <div style="height: 160px;" class="loading-skeleton"></div>
        <div style="height: 160px;" class="loading-skeleton"></div>
      </div>
    </main>
  </div>

  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html" class="mobile-nav-item">
        <span class="mnav-icon">🏠</span><span>Главная</span>
      </a>
      <a href="upload.html" class="mobile-nav-item">
        <span class="mnav-icon">🎙️</span><span>Загрузить</span>
      </a>
      <a href="quizzes.html" class="mobile-nav-item active">
        <span class="mnav-icon">🧠</span><span>Квизы</span>
      </a>
    </div>
  </nav>

  <script>
    const CONFIG = { API_URL: 'https://d5dl1rb13ng0aicdmdk1.hsvi2zuh.apigw.yandexcloud.net' }
    const token = localStorage.getItem('token')
    const user = JSON.parse(localStorage.getItem('user') || 'null')
    if (!token) { window.location.href = 'index.html' }
    if (user) {
      document.getElementById('userName').textContent = user.name || user.email
      const initial = (user.name || user.email || '?')[0].toUpperCase()
      document.getElementById('avatarInitial').textContent = initial
      document.getElementById('mobileAvatar').textContent = initial
    }

    async function loadQuizzes() {
      try {
        const res = await fetch(`${CONFIG.API_URL}/quizzes`, { headers: { Authorization: `Bearer ${token}` } })
        const data = await res.json()
        renderQuizzes(data.quizzes || [])
      } catch (e) {
        document.getElementById('quizGrid').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Не удалось загрузить</div></div>`
      }
    }

    function renderQuizzes(quizzes) {
      const grid = document.getElementById('quizGrid')
      if (!quizzes.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🧠</div><div class="empty-title">Пока нет квизов</div><p class="empty-sub">Открой транскрипцию и нажми "Создать квиз"</p><a href="dashboard.html" class="btn-primary">Перейти к лекциям</a></div>`
        return
      }
      grid.innerHTML = quizzes.map(q => {
        const date = new Date(q.created_at).toLocaleDateString('ru-RU')
        const count = Array.isArray(q.questions) ? q.questions.length : 0
        return `<div class="quiz-card">
          <div class="quiz-card-header">
            <div class="quiz-icon">🧠</div>
            <div class="quiz-title">${q.title}</div>
          </div>
          <div class="quiz-meta">
            <div class="quiz-meta-item">📅 ${date}</div>
            ${q.transcription_title ? `<div class="quiz-meta-item">🎙️ ${q.transcription_title}</div>` : ''}
          </div>
          <div class="quiz-footer">
            <span class="quiz-questions-count">${count} вопросов</span>
            <a href="quiz.html?id=${q.id}" class="btn-start">Пройти →</a>
          </div>
        </div>`
      }).join('')
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html' }
    loadQuizzes()
  </script>
</body>
</html>
